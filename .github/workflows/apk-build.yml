name: Build Invoice Generator APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create invoiceapp com.invoice.teallanka TealLankaInvoice
        
        cd invoiceapp
        cordova platform add android
        
        # icon එකක් තියෙනවා නම් res folder එකට copy කරනවා
        if [ -f "../icon.png" ]; then
          mkdir -p res
          cp ../icon.png res/icon.png
        fi
        
        # config.xml එක සකස් කිරීම - මෙතන content src එකට ඔයාගේ URL එක දාලා තියෙන්නේ
        cat <<EOF > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.invoice.teallanka" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>TealLanka Invoice</name>
            <description>Teal Lanka Invoice Generator App</description>
            <author email="dev@callback.com" href="http://cordova.io">Teal Lanka Team</author>
            
            <content src="https://adminasasalanka.github.io/teallankainvoices/index.html" />
            
            <access origin="*" />
            <allow-navigation href="https://adminasasalanka.github.io/*" />
            <allow-navigation href="*" />
            
            <icon src="res/icon.png" />
        </widget>
        EOF

    - name: Build Android APK
      run: |
        cd invoiceapp
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Invoice-APK
        path: invoiceapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
