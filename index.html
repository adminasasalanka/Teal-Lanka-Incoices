<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teal Lanka Bio Tech - Invoice Generator</title>
    <!-- html2pdf සහ html2canvas libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 10px;

        }
        /* --- Input Form Styling --- */
        .form-container {
            max-width: 750px;
            margin: 10px auto 30px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-top: 8px solid #008751;
            box-sizing: border-box;
        }
        .form-container h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        ::placeholder {
            color: #b3b3b3 !important;
            opacity: 1; 
        }
        .items-heading {
            margin-top: 25px;
            border-bottom: 2px solid #008751;
            padding-bottom: 5px;
            color: #008751;
            font-size: 18px;
        }
        /* Responsive Item Row Configuration */
        .item-row {
            display: flex;
            flex-direction: row;
            gap: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 4px;
            border-left: 4px solid #008751;
            align-items: center;
            flex-wrap: wrap;
        }
        .item-number {
            font-weight: bold;
            color: #333;
            min-width: 20px;
        }
        .item-row input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .item-row input.desc { flex: 2; min-width: 150px; }
        .item-row input.qty { flex: 0.5; min-width: 70px; }
        .item-row input.price { flex: 0.5; min-width: 90px; }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-add { background-color: #008751; color: white; margin-top: 5px; width: 100%; }
        .btn-remove { background-color: #d9534f; color: white; padding: 10px 15px; }
        .btn-generate { background-color: #1a73e8; color: white; width: 100%; margin-top: 25px; font-size: 16px; padding: 14px; }
        
        /* Action Buttons Grid - Button 3ක් සඳහා සැකසීම */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            max-width: 800px;
            margin: 0 auto 20px auto;
            padding: 0 10px;
        }
        .action-buttons button { margin: 0; padding: 12px; font-size: 14px; }
        .btn-print { background-color: #333; color: white; }
        .btn-download { background-color: #e09200; color: white; }
        .btn-image { background-color: #9c27b0; color: white; }
        
        /* --- Invoice Layout Styling --- */
        #invoice-wrapper {
            display: none; 
            max-width: 800px;
            margin: 0 auto;
            overflow-x: auto; 
            padding: 5px;
        }
        #invoice-preview {
            background: #fff;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 1px solid #ccc;
            min-width: 650px; 
            box-sizing: border-box;
        }
        .invoice-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .company-name {
            font-size: 38px;
            font-weight: bold;
            color: #111;
            display: inline-block;
            vertical-align: middle;
        }
        .company-address {
            font-size: 13px;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        
        .meta-info-table {
            width: 100%;
            margin-top: 20px;
            font-size: 12px;
            font-weight: bold;
            border-collapse: collapse;
            line-height: 1.4;
        }
        .meta-info-table td {
            padding: 0;
            vertical-align: top;
        }
        
        .bill-bar {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .bill-bar td {
            border: 2px solid #000;
            padding: 8px 10px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .main-invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .main-invoice-table th {
            border: 2px solid #000;
            padding: 6px 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }
        
        .grid-cell {
            border-left: 2px solid #000;
            border-right: 2px solid #000;
            padding: 10px 8px;
            font-size: 13px;
            vertical-align: top;
            height: 480px; 
        }
        
        .item-list-row {
            padding: 4px 0;
            min-height: 22px;
            box-sizing: border-box;
        }
        
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0px; 
        }
        .summary-table td {
            border: 2px solid #000;
            padding: 6px 8px;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* --- Media Queries --- */
        @media screen and (max-width: 600px) {
            .item-row {
                flex-direction: column;                align-items: stretch;
            }
            .item-row input.desc, .item-row input.qty, .item-row input.price {
                width: 100%;
                flex: none;                max-width: 100%;
            }
            .btn-remove {
                width: 100%;
                text-align: center;
            }
            body {
                padding: 5px;
            }
            .form-container {
                padding: 15px;
            }
        }
        
        @media print {
            .form-container, .action-buttons { display: none !important; }
            #invoice-wrapper { display: block !important; overflow-x: visible !important; }
            #invoice-preview { border: none; padding: 0; box-shadow: none; min-width: auto; }
            body { background: #fff; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="form-container" id="inputForm">
        <h2>Teal Lanka Bio Tech <br><span style="font-size: 14px; color: #666; font-weight: normal;">Invoice Generator Form</span></h2>
        <hr style="border: 1px solid #008751; margin-bottom: 20px;">
        
        <div class="form-group">
            <label for="formBillTo">Bill To :</label>
            <input type="text" id="formBillTo" placeholder="Customer name">
        </div>
        
        <div class="form-group">
            <label for="formDate">Date :</label>
            <input type="text" id="formDate" placeholder="e.g., 06/06/2026">
        </div>

        <h3 class="items-heading">Items</h3>
        <div id="items-container">
            <div class="item-row">
                <span class="item-number">1</span>
                <input type="text" placeholder="Item Description" class="desc">
                <input type="number" placeholder="Qty" class="qty">
                <input type="number" placeholder="Price" class="price">
                <button type="button" class="btn-remove" onclick="removeItemRow(this)">X</button>
            </div>
        </div>
        
        <button type="button" class="btn-add" onclick="addItemRow()">+ Add Item Row</button>

        <div class="form-group" style="margin-top: 25px;">
            <label for="formDiscount">Discount Amount (Rs.) :</label>
            <input type="number" id="formDiscount" placeholder="0">
        </div>

        <button type="button" class="btn-generate" onclick="generateInvoice()">Generate & View Invoice</button>
    </div>

    <!-- ඇප් එක ඇතුළේ වැඩ කරන බටන්ස් (PDF සහ Image බටන් එකතු කලා) -->
    <div class="action-buttons" id="actionArea" style="display:none;">
        <button class="btn-print" onclick="window.print()">Print (Browser)</button>
        <button class="btn-download" onclick="downloadInvoicePDF()">Save as PDF</button>
        <button class="btn-image" onclick="downloadInvoiceImage()">Save as Image</button>
    </div>
